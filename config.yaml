# Deep-AE Global Configuration

project:
  name: "Deep-AE"
  version: "1.0.0"

paths:
  data_dir: "dataset/"
  raw_data_dir: "dataset/raw/"
  processed_data_dir: "dataset/processed/"
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"
  experiment_dir: "experiments/"

audio:
  sample_rate: 22050
  duration_sec: 2.0
  n_fft: 2048
  hop_length: 512
  n_mels: 128

logging:
  level: "INFO"
  format: "[%(asctime)s] %(levelname)s [%(name)s] %(message)s"
  log_to_console: true
  log_to_file: true
